name: Schema Lens Jest

on:
  push:
    paths:
      - "schema-lens/**"
      - ".github/workflows/schema-lens-jest.yml"
  pull_request:
    paths:
      - "schema-lens/**"
      - ".github/workflows/schema-lens-jest.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: schema-lens

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: schema-lens/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test
