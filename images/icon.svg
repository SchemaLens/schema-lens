<svg
  width="128"
  height="128"
  viewBox="0 0 128 128"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Schema Lens logo"
>
  <!-- Background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#1e1e1e" />

  <!-- Subtle inner panel -->
  <rect x="20" y="24" width="88" height="80" rx="18" fill="#252526" />

  <!-- Table grid (schema) -->
  <!-- Row 1 -->
  <rect x="28" y="34" width="18" height="14" rx="2" fill="#2d2d2d" stroke="#3c3c3c" stroke-width="1.2" />
  <rect x="48" y="34" width="18" height="14" rx="2" fill="#2d2d2d" stroke="#3c3c3c" stroke-width="1.2" />
  <rect x="68" y="34" width="18" height="14" rx="2" fill="#2d2d2d" stroke="#3c3c3c" stroke-width="1.2" />
  <!-- Row 2 -->
  <rect x="28" y="52" width="18" height="14" rx="2" fill="#2d2d2d" stroke="#3c3c3c" stroke-width="1.2" />
  <rect x="48" y="52" width="18" height="14" rx="2" fill="#2d2d2d" stroke="#3c3c3c" stroke-width="1.2" />
  <rect x="68" y="52" width="18" height="14" rx="2" fill="#2d2d2d" stroke="#3c3c3c" stroke-width="1.2" />
  <!-- Row 3 -->
  <rect x="28" y="70" width="18" height="14" rx="2" fill="#2d2d2d" stroke="#3c3c3c" stroke-width="1.2" />
  <rect x="48" y="70" width="18" height="14" rx="2" fill="#2d2d2d" stroke="#3c3c3c" stroke-width="1.2" />
  <rect x="68" y="70" width="18" height="14" rx="2" fill="#2d2d2d" stroke="#3c3c3c" stroke-width="1.2" />

  <!-- Highlight one "primary" table cell -->
  <rect x="48" y="52" width="18" height="14" rx="2" fill="#1e1e1e" stroke="#4EC9B0" stroke-width="1.6" />

  <!-- Relationship lines (light hints) -->
  <line x1="57" y1="66" x2="77" y2="76" stroke="#4EC9B0" stroke-width="1.4" stroke-linecap="round" opacity="0.65" />
  <line x1="37" y1="77" x2="57" y2="87" stroke="#4EC9B0" stroke-width="1.2" stroke-linecap="round" opacity="0.45" />

  <!-- Lens (magnifying glass) -->
  <circle
    cx="86"
    cy="70"
    r="20"
    fill="none"
    stroke="#4EC9B0"
    stroke-width="3"
  />
  <!-- Lens inner highlight -->
  <circle
    cx="86"
    cy="70"
    r="14"
    fill="none"
    stroke="#4EC9B0"
    stroke-width="1.4"
    opacity="0.6"
  />
  <!-- Handle -->
  <line
    x1="97"
    y1="81"
    x2="108"
    y2="92"
    stroke="#4EC9B0"
    stroke-width="3"
    stroke-linecap="round"
  />

  <!-- Tiny accent node under the lens (focused cell) -->
  <rect x="80" y="64" width="12" height="9" rx="1.5" fill="#1e1e1e" stroke="#4EC9B0" stroke-width="1.4" />
</svg>
